# gapclub.fmtcloud.cn 
# 放在服务器 /etc/nginx/conf.d/gapclub.fmtcloud.cn.conf

upstream gapclub_backend {
    server 127.0.0.1:8000;
    keepalive 128;
}

upstream gapclub_frontend {
    server 127.0.0.1:3000;
    keepalive 128;
}

# -------------------- HTTP -> HTTPS 跳转 --------------------
server {
    listen 80;
    server_name gapclub.fmtcloud.cn www.gapclub.fmtcloud.cn;

    # 先放通 Let's Encrypt 验证
    location /.well-known {
        root /opt/gapclub/frontend;
        allow all;
    }

    return 301 https://$host$request_uri;
}

# -------------------- HTTPS 主站 --------------------
server {

    listen 443 ssl http2;
    server_name gapclub.fmtcloud.cn www.gapclub.fmtcloud.cn;

    # SSL 证书（需要申请 gapclub.fmtcloud.cn 的证书）
    ssl_certificate     /etc/nginx/ssl/gapclub.fmtcloud.cn/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/gapclub.fmtcloud.cn/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---------- 前端代理到前端容器 ----------
    location /.well-known { allow all; }

    location / {
        proxy_pass http://gapclub_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        proxy_pass http://gapclub_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 25m;
    }

    # ---------- 后端静态文件（上传的资源） ----------
    location /static/ {
        proxy_pass http://gapclub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- 健康检查 ----------
    location /health {
        proxy_pass http://gapclub_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


    # ---------- 日志 ----------
    access_log /var/log/nginx/gapclub.fmtcloud.cn.access.log;
    error_log  /var/log/nginx/gapclub.fmtcloud.cn.error.log;
}
